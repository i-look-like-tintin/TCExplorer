; Custom PHP configuration for Azure App Service
; This file will be automatically loaded by PHP on Azure

; Memory limits for handling large CSV files
memory_limit = 512M
upload_max_filesize = 350M
post_max_size = 350M

; Execution time limits
max_execution_time = 300
max_input_time = 300

; File handling
file_uploads = On
allow_url_fopen = On

; Error reporting (disable in production)
display_errors = Off
log_errors = On
error_log = /home/LogFiles/php_errors.log

; Compression support
zlib.output_compression = Off
